name: DeepSeek Local Config
version: 1.0.0
schema: v1

# Контекст-провайдеры для доступа к проекту
context:
  - provider: folder
  - provider: code
  - provider: currentFile
  - provider: codebase
  - provider: diff
  - provider: terminal

# Основные модели
models:
  - name: DeepSeek-R1 8B (основная)
    provider: ollama
    model: deepseek-r1:8b
    apiBase: http://localhost:11434

  - name: DeepSeek-R1 8B (альтернатива)
    provider: ollama
    model: deepseek-r1:8b
    apiBase: http://localhost:11434
    # Можно добавить параметры для настройки
    completionOptions:
      temperature: 0.6
      maxTokens: 4096

# Модель для автодополнения во время печати
tabAutocompleteModel:
  name: DeepSeek Coder (автодополнение)
  provider: ollama
  model: deepseek-coder:1.3b  # или deepseek-r1:1.5b если есть
  apiBase: http://localhost:11434

# Для поиска по коду (embeddings)
embeddingsProvider:
  provider: ollama
  model: nomic-embed-text
  apiBase: http://localhost:11434

# Дополнительные настройки
experimental:
  inlineEdit: true  # Включить редактирование прямо в файле